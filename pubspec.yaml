name: f1_hub
description: F1 Hub - Formula 1 Cross-Platform App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '^3.11.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  http: ^1.1.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  go_router: ^12.1.1
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  intl: ^0.18.1
  url_launcher: ^6.2.1
  connectivity_plus: ^5.0.2
  shared_preferences: ^2.2.2
  flutter_animate: ^4.3.0
  lottie: ^3.0.0
  webview_flutter: ^4.4.2
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.7
  flutter_lints: ^3.0.0
  bloc_test: ^9.1.5
  mocktail: ^1.0.2
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.3.9

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#0F0F0F"
  color_dark: "#0F0F0F"
  image: assets/images/splash.png
  android: true
  ios: true